# Dev: usługi zależne (Postgres + MinIO). Aplikację uruchamiasz lokalnie: npm run dev
# Prod-like: docker compose --profile prod up --build  (dorzuca zbudowaną aplikację)

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: store
      POSTGRES_PASSWORD: store
      POSTGRES_DB: store
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store -d store"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Lokalny serwer maili (dev): SMTP na :1025, web UI na :8025.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # Jednorazowo tworzy bucket na media i ustawia publiczny odczyt.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/store-media || true;
      mc anonymous set download local/store-media || true;
      echo 'MinIO bucket gotowy';
      "

  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://store:store@postgres:5432/store?schema=public"
      S3_ENDPOINT: "http://minio:9000"
    ports:
      - "3000:3000"

  # Jednorazowe migracje (pełne zależności Prisma). Uruchamiane przed `app`.
  migrate:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://store:store@postgres:5432/store?schema=public"

volumes:
  pgdata:
  miniodata:
